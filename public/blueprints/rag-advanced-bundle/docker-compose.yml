# Docker Compose 配置 - RAG 生产级部署
# 包含：Qdrant (向量数据库) + Cross-Encoder Re-ranking 服务

version: '3.8'

services:
  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G
    restart: unless-stopped
    networks:
      - rag-network

  # Cross-Encoder Re-ranking 服务
  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.4
    container_name: reranker
    ports:
      - "8080:80"
    environment:
      - MODEL_ID=BAAI/bge-reranker-large
      - NUM_SHARD=1
    deploy:
      resources:
        limits:
          memory: 8G
    restart: unless-stopped
    networks:
      - rag-network

  # Embedding 服务
  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.4
    container_name: embedding
    ports:
      - "8081:80"
    environment:
      - MODEL_ID=BAAI/bge-large-en-v1.5
      - NUM_SHARD=1
    deploy:
      resources:
        limits:
          memory: 8G
    restart: unless-stopped
    networks:
      - rag-network

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - rag-network

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring_dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - rag-network

volumes:
  qdrant_storage:
  prometheus_data:
  grafana_data:

networks:
  rag-network:
    driver: bridge
