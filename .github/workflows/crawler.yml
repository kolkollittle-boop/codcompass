# 爬虫默认仅在本地执行（automation/crawler）。此处不再定时/推送触发，避免在 GitHub 上跑抓取。
# 若仍需在 Actions 手动试跑：打开 workflow_dispatch 并在仓库 Secrets 中配置密钥。
name: Crawler

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'CrawlerJob id from admin (optional)'
        required: false
      triggered_by:
        description: 'manual'
        required: false
        default: 'manual'

jobs:
  scrape-and-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci --ignore-scripts || npm install

      - name: Install Crawler Dependencies
        working-directory: ./automation/crawler
        run: npm ci --ignore-scripts || npm install

      - name: Run Crawler locally on runner (optional / not recommended)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          CRAWLER_SCORE_THRESHOLD: '80'
        run: cd automation/crawler && npx tsx src/run.ts
