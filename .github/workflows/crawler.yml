name: Crawler

on:
  schedule:
    - cron: '0 * * * *'  # 每小时自动抓取一次
  workflow_dispatch:
    inputs:
      job_id:
        description: 'CrawlerJob id from admin (optional, for tracing)'
        required: false
      triggered_by:
        description: 'admin | schedule | push'
        required: false
        default: 'admin'
  push:
    branches:
      - main              # 每次推送代码到 main 也会尝试运行

jobs:
  scrape-and-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci --ignore-scripts || npm install

      - name: Install Crawler Dependencies
        working-directory: ./automation/crawler
        run: npm ci --ignore-scripts || npm install

      - name: Run Crawler & AI Scorer
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: cd automation/crawler && npx tsx src/run.ts
